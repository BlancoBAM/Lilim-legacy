[models]
local_model_path = "/home/blanco/models/Qwen3-VL-4B-Instruct"
local_model_type = "qwen3-vl"  # Crane supports Qwen3-VL 2B and 4B
quantization = "Q4_K_M"
fallback_provider = "openai"  # or "anthropic", "gemini"

[api_keys]
# Add your API keys here
# openai = "sk-..."
# anthropic = "sk-ant-..."
# gemini = "..."

[rag]
vector_index = "/home/blanco/Lilim/current/lilith_rag_builder/rag_ready/rag_index"
keyword_index = "/home/blanco/Lilim/current/lilith_rag_builder/rag_ready/keyword_index"

[routing]
complexity_threshold = 3.0
max_local_context_length = 2048

[personality]
responses_yaml_path = "/home/blanco/Lilim/current/lilim-responses.yaml"

[agent]
yolo_mode = false
max_tool_calls_per_query = 5
allowed_search_paths = ["/home/blanco"]
enable_web_search = true
enable_file_search = true
enable_terminal = true

[memory]
db_path = "/home/blanco/.local/share/lilim/conversations.db"
max_history_messages = 20
cleanup_days = 90
